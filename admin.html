<html>

<head>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="main">

<h2>Admin Dashboard</h2>

<table>

<tr>
<th>Title</th>
<th>Category</th>
<th>Location</th>
<th>Status</th>
<th>Update</th>
</tr>

{% for c in complaints %}

<tr>

<td>{{c.title}}</td>
<td>{{c.category}}</td>
<td>{{c.location}}</td>
<td>{{c.status}}</td>

<td>

<form action="/update/{{c.id}}" method="post">

<select name="status">

<option>Pending</option>
<option>In Progress</option>
<option>Resolved</option>

</select>

<button class="btn">Update</button>

</form>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
